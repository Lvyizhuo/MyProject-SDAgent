# ===========================================
# 山东省智能政策咨询助手 - Docker Compose
# 后端依赖 + 后端服务
# ===========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: policy-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: policy_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: policy-agent-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: policy-agent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: policy-agent-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_QUEUE: 64
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: policy-agent-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    command: ["pull", "all-minilm:latest"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: policy-agent-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_MODEL_PROVIDER_ENCRYPTION_SECRET: ${APP_MODEL_PROVIDER_ENCRYPTION_SECRET:-}
      APP_MODEL_PROVIDER_LEGACY_ENCRYPTION_SECRETS: ${APP_MODEL_PROVIDER_LEGACY_ENCRYPTION_SECRETS:-}
      APP_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5173,http://127.0.0.1:5173}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/policy_agent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_KNOWLEDGE_MINIO_ENDPOINT: http://minio:9000
      APP_KNOWLEDGE_MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      APP_KNOWLEDGE_MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      APP_EMBEDDING_OLLAMA_BASE_URL: http://ollama:11434
      APP_KNOWLEDGE_MIGRATION_ENABLED: "true"
      APP_KNOWLEDGE_MIGRATION_TARGET_MODEL: ollama:all-minilm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
