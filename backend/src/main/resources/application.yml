# ===========================================
# 山东省智能政策咨询助手 - 应用配置
# ===========================================

spring:
  application:
    name: policy-agent

  # PostgreSQL + PgVector 配置
  datasource:
    url: jdbc:postgresql://localhost:5432/policy_agent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 配置 (用于 ChatMemory)
  data:
    redis:
      host: localhost
      port: 6379

  # Spring AI 配置 - 使用阿里云 DashScope (通义千问)
  ai:
    openai:
      # 使用 DashScope API (OpenAI 兼容接口)
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
      embedding:
        options:
          model: qwen3-vl-embedding
    
    # PgVector 向量存储配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true
        schema-name: public
        table-name: vector_store
        max-document-batch-size: 10000

    # MCP 客户端默认关闭自动初始化，避免未配置时启动失败
    mcp:
      client:
        enabled: true
        initialized: false

# 服务器配置
server:
  address: 0.0.0.0
  port: 8080

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.shandong.policyagent: DEBUG
    org.springframework.ai: DEBUG

# DashScope 多模态配置
dashscope:
  multimodal:
    api-key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/api/v1
    asr:
      model: qwen3-asr-flash
      # 长音频使用 filetrans 模型
      long-audio-model: qwen3-asr-flash-filetrans
    vision:
      model: qwen-vl-plus
      # 高精度场景使用 max 模型
      high-quality-model: qwen-vl-max

# 应用配置
app:
  # JWT 配置
  jwt:
    # Base64 encoded secret key (生产环境请更换)
    secret: c2VjdXJlU2VjcmV0S2V5Rm9yUG9saWN5QWdlbnRBcHBsaWNhdGlvbjIwMjZKV1Q=
    # Token 有效期 (毫秒) - 默认 24 小时
    expiration: 86400000

  # RAG 配置
  rag:
    document-path: data
    scraped:
      enabled: true
      policy-json-paths:
        - scripts/data/scraped/policies.json
        - data/scraped/policies.json
    incremental:
      enabled: true
      state-file-path: data/.rag-ingestion-state.json
    bootstrap:
      auto-load-on-startup: true
    chunking:
      default-chunk-size: 1600
      min-chunk-size-chars: 350
      min-chunk-length-to-embed: 5
      chunk-overlap: 300
      keep-separator: true
      no-split-max-chars: 6000
    retrieval:
      top-k: 5
      similarity-threshold: 0.7
      candidate-top-k: 20
      rerank-enabled: true
      rerank-model: qwen3-vl-rerank
      rerank-endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
      rerank-max-doc-chars: 3000

  # Advisor 配置
  advisor:
    # ChatMemory 配置
    memory:
      ttl-days: 7
    # Security Advisor 配置
    security:
      enabled: true
    # ReReading Advisor 配置
    re-reading:
      enabled: true
    # Logging Advisor 配置
    logging:
      log-token-usage: true
      log-retrieved-docs: true

  # 联网搜索配置 (Tavily Search API)
  websearch:
    enabled: true
    timeout-seconds: 15
    cache-to-vectorstore: true
    cache:
      ttl-minutes: 120
      revalidate-on-expire: true
      serve-stale-on-error: true
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: https://api.tavily.com
      search-depth: advanced
      max-results: 5

  # ReAct 智能体工作流配置
  agent:
    planning-enabled: true
    max-planning-steps: 4

  security:
    cors:
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
        - "http://192.168.*.*:*"
        - "http://10.*.*.*:*"
        - "http://172.16.*.*:*"
        - "http://172.17.*.*:*"
        - "http://172.18.*.*:*"
        - "http://172.19.*.*:*"
        - "http://172.20.*.*:*"
        - "http://172.21.*.*:*"
        - "http://172.22.*.*:*"
        - "http://172.23.*.*:*"
        - "http://172.24.*.*:*"
        - "http://172.25.*.*:*"
        - "http://172.26.*.*:*"
        - "http://172.27.*.*:*"
        - "http://172.28.*.*:*"
        - "http://172.29.*.*:*"
        - "http://172.30.*.*:*"
        - "http://172.31.*.*:*"

  tools:
    retry:
      max-attempts: 2
      backoff-millis: 350
