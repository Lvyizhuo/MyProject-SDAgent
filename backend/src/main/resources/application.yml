# ===========================================
# 山东省智能政策咨询助手 - 应用配置
# ===========================================

spring:
  application:
    name: policy-agent

  # Multipart 上传限制
  servlet:
    multipart:
      # 单文件最大 30MB
      max-file-size: 30MB
      # 单次请求总大小最大 30MB
      max-request-size: 30MB

  # PostgreSQL + PgVector 配置
  datasource:
    url: jdbc:postgresql://localhost:5432/policy_agent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 配置 (用于 ChatMemory)
  data:
    redis:
      host: localhost
      port: 6379

  # Spring AI 配置 - 使用阿里云 DashScope (通义千问)
  ai:
    openai:
      # 使用 DashScope API (OpenAI 兼容接口)
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
    
    # PgVector 向量存储配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true
        schema-name: public
        table-name: vector_store
        max-document-batch-size: 10000

    # MCP 客户端默认关闭自动初始化，避免未配置时启动失败
    mcp:
      client:
        enabled: true
        initialized: false

# 服务器配置
server:
  address: 0.0.0.0
  port: 8080

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.shandong.policyagent: DEBUG
    org.springframework.ai: DEBUG

# DashScope 多模态配置
dashscope:
  multimodal:
    api-key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/api/v1
    asr:
      model: qwen3-asr-flash
      # 长音频使用 filetrans 模型
      long-audio-model: qwen3-asr-flash-filetrans
    vision:
      model: qwen-vl-plus
      # 高精度场景使用 max 模型
      high-quality-model: qwen-vl-max

# 应用配置
app:
  chat:
    mode: sync-only # sync-only | dual

  # JWT 配置
  jwt:
    # Base64 encoded secret key (生产环境请更换)
    secret: c2VjdXJlU2VjcmV0S2V5Rm9yUG9saWN5QWdlbnRBcHBsaWNhdGlvbjIwMjZKV1Q=
    # Token 有效期 (毫秒) - 默认 24 小时
    expiration: 86400000

  # RAG 配置 (旧方式，已禁用)
  rag:
    document-path: data
    scraped:
      enabled: false
      policy-json-paths:
        - scripts/data/scraped/policies.json
        - data/scraped/policies.json
    incremental:
      enabled: true
      state-file-path: data/.rag-ingestion-state.json
    bootstrap:
      auto-load-on-startup: false
    # 注意：当前 RAG 检索链路读取的是 app.rag.retrieval（RagConfig）
    retrieval:
      top-k: 3
      similarity-threshold: 0.5
      candidate-top-k: 20
      rerank-enabled: true
      rerank-model: qwen3-vl-rerank
      rerank-endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
      rerank-max-doc-chars: 3000

  # Knowledge Base 配置 (新方式)
  knowledge:
    ingest:
      scheduler-enabled: true
      poll-interval-ms: 2000
      batch-size: 20
      max-concurrent: 2
      max-per-minute: 30
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-name: policy-documents

    embedding:
      default-model: ollama:nomic-embed-text
      models:
        - id: ollama:nomic-embed-text
          provider: ollama
          base-url: ${APP_EMBEDDING_OLLAMA_BASE_URL:http://localhost:11434}
          model-name: nomic-embed-text:latest
          dimensions: 768
          vector-table: vector_store_ollama_nomic_768
          max-input-chars: 900
        - id: dashscope:text-embedding-v3
          provider: dashscope
          base-url: https://dashscope.aliyuncs.com/compatible-mode
          api-key: ${DASHSCOPE_API_KEY}
          model-name: text-embedding-v3
          dimensions: 1024
          vector-table: vector_store_dashscope_v3
          max-input-chars: 6000
    migration:
      enabled: ${APP_KNOWLEDGE_MIGRATION_ENABLED:false}
      target-model: ${APP_KNOWLEDGE_MIGRATION_TARGET_MODEL:ollama:nomic-embed-text}
    chunking:
      default-chunk-size: 900
      min-chunk-size-chars: 250
      min-chunk-length-to-embed: 5
      chunk-overlap: 150
      keep-separator: true
      no-split-max-chars: 900
    # 检索参数统一走 app.rag.retrieval，避免与 app.knowledge.retrieval 双轨导致配置混淆

  # Advisor 配置
  advisor:
    # ChatMemory 配置
    memory:
      ttl-days: 7
      summary-enabled: true
      summary-trigger-messages: 8
      summary-keep-messages: 4
      summary-max-chars: 1200
      summary-timeout-seconds: 8
    # Security Advisor 配置
    security:
      enabled: true
    # ReReading Advisor 配置
    re-reading:
      enabled: true
    # Logging Advisor 配置
    logging:
      log-token-usage: true
      log-retrieved-docs: true

  # 联网搜索配置 (Tavily Search API)
  websearch:
    enabled: true
    timeout-seconds: 15
    singleflight-enabled: true
    async-vector-cache: true
    stale-while-revalidate: true
    cache-to-vectorstore: true
    cache:
      ttl-minutes: 120
      revalidate-on-expire: true
      serve-stale-on-error: true
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: https://api.tavily.com
      search-depth: advanced
      max-results: 5

  # ReAct 智能体工作流配置
  agent:
    planning-enabled: true
    max-planning-steps: 4
    planning-timeout-seconds: 15
    fast-path-enabled: true
    pre-rag-enabled: true
    pre-rag-direct-threshold: 0.86
    react-complexity-threshold: 0.65

  qa-cache:
    enabled: true
    ttl-minutes: 1440
    semantic-threshold: 0.92
    bucket-prefix-bits: 14

  security:
    cors:
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
        - "http://192.168.*.*:*"
        - "http://10.*.*.*:*"
        - "http://172.16.*.*:*"
        - "http://172.17.*.*:*"
        - "http://172.18.*.*:*"
        - "http://172.19.*.*:*"
        - "http://172.20.*.*:*"
        - "http://172.21.*.*:*"
        - "http://172.22.*.*:*"
        - "http://172.23.*.*:*"
        - "http://172.24.*.*:*"
        - "http://172.25.*.*:*"
        - "http://172.26.*.*:*"
        - "http://172.27.*.*:*"
        - "http://172.28.*.*:*"
        - "http://172.29.*.*:*"
        - "http://172.30.*.*:*"
        - "http://172.31.*.*:*"

  tools:
    retry:
      max-attempts: 2
      backoff-millis: 350

  model-provider:
    openai:
      connect-timeout-seconds: 10
      read-timeout-seconds: 90
    direct:
      connect-timeout-seconds: 10
      read-timeout-seconds: 90
